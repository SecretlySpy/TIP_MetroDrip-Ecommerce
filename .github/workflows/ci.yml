# CI on every push (handover §2). Lint + full test suite against real MySQL 8 —
# the zero-oversell concurrency gate (§3.1) only means something on InnoDB.
name: CI

on:
  push:
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: metrodrip
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      # root so pytest-django may CREATE/DROP the test database
      MYSQL_DATABASE: metrodrip
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3306"
      DJANGO_SECRET_KEY: ci-only-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (pytest)
        run: pytest
