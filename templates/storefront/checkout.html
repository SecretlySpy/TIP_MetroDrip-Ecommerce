{% extends "base.html" %}
{% load money %}
{% block title %}Checkout | MetroDrip{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-6xl" x-data="checkout()">
    <h1 class="font-display text-4xl uppercase tracking-tighter mb-8">Checkout</h1>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Left: Form -->
        <div class="lg:col-span-7">
            <div class="bg-surface border-2 border-ink p-6 lg:p-8">
                <h2 class="font-display text-2xl uppercase tracking-tighter mb-6 pb-2 border-b-2 border-border">Shipping Details</h2>
                
                <form id="checkoutForm" @submit.prevent="submitOrder">
                    <div class="space-y-4">
                        <div>
                            <label class="block font-mono text-sm uppercase tracking-wide mb-1">Full Name *</label>
                            <input type="text" x-model="form.customer_name" required class="w-full bg-white border-2 border-ink px-4 py-2 focus:outline-none focus:ring-2 focus:ring-volt font-mono">
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block font-mono text-sm uppercase tracking-wide mb-1">Email *</label>
                                <input type="email" x-model="form.email" required class="w-full bg-white border-2 border-ink px-4 py-2 focus:outline-none focus:ring-2 focus:ring-volt font-mono">
                            </div>
                            <div>
                                <label class="block font-mono text-sm uppercase tracking-wide mb-1">Phone Number *</label>
                                <input type="tel" x-model="form.phone" required class="w-full bg-white border-2 border-ink px-4 py-2 focus:outline-none focus:ring-2 focus:ring-volt font-mono">
                            </div>
                        </div>

                        <div>
                            <label class="block font-mono text-sm uppercase tracking-wide mb-1">Address *</label>
                            <input type="text" x-model="form.address_line1" required class="w-full bg-white border-2 border-ink px-4 py-2 focus:outline-none focus:ring-2 focus:ring-volt font-mono" placeholder="House/Unit No., Street, Barangay">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block font-mono text-sm uppercase tracking-wide mb-1">City *</label>
                                <input type="text" x-model="form.city" required class="w-full bg-white border-2 border-ink px-4 py-2 focus:outline-none focus:ring-2 focus:ring-volt font-mono">
                            </div>
                            <div>
                                <label class="block font-mono text-sm uppercase tracking-wide mb-1">Region/Zone *</label>
                                <select x-model="form.zone_id" @change="updateShipping" required class="w-full bg-white border-2 border-ink px-4 py-2 focus:outline-none focus:ring-2 focus:ring-volt font-mono">
                                    <option value="">Select Region</option>
                                    {% for zone in zones %}
                                        <option value="{{ zone.id }}" data-fee="{{ zone.fee }}">{{ zone.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 pt-6 border-t-2 border-border">
                        <button type="submit" :disabled="isSubmitting || cartItems.length === 0" 
                                class="w-full bg-volt text-ink border-2 border-ink px-8 py-4 font-display text-xl uppercase tracking-wider hover:bg-ink hover:text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                            <span x-show="!isSubmitting">Proceed to Payment</span>
                            <span x-show="isSubmitting">Processing...</span>
                        </button>
                        <template x-if="errorMessage">
                            <p class="mt-4 text-danger font-mono text-sm" x-text="errorMessage"></p>
                        </template>
                    </div>
                </form>
            </div>
        </div>

        <!-- Right: Summary -->
        <div class="lg:col-span-5">
            <div class="bg-white border-2 border-ink p-6 relative">
                <div class="absolute top-0 right-0 w-8 h-full border-l-2 border-ink border-dashed flex flex-col justify-between py-2 items-center text-muted">
                    <span class="block w-1 h-1 rounded-full bg-ink"></span>
                    <span class="block w-1 h-1 rounded-full bg-ink"></span>
                    <span class="block w-1 h-1 rounded-full bg-ink"></span>
                    <span class="block w-1 h-1 rounded-full bg-ink"></span>
                    <span class="block w-1 h-1 rounded-full bg-ink"></span>
                </div>

                <h2 class="font-display text-2xl uppercase tracking-tighter mb-6 pr-8">Order Summary</h2>

                <div class="space-y-4 mb-6 pr-8 max-h-[40vh] overflow-y-auto">
                    <template x-for="item in cartItems" :key="item.variant_id">
                        <div class="flex justify-between items-start text-sm font-mono border-b border-border pb-4">
                            <div>
                                <p class="font-bold text-ink" x-text="item.name"></p>
                                <p class="text-muted text-xs mt-1" x-text="`Size: ${item.size} | Color: ${item.color} | Fit: ${item.fit}`"></p>
                                <p class="text-muted text-xs mt-1" x-text="`Qty: ${item.qty}`"></p>
                            </div>
                            <div class="text-right">
                                <p class="text-ink" x-text="formatMoney(item.price * item.qty)"></p>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="border-t-2 border-ink pt-4 pr-8 font-mono">
                    <div class="flex justify-between mb-2">
                        <span class="text-muted uppercase tracking-wide text-sm">Subtotal</span>
                        <span x-text="formatMoney(subtotal)"></span>
                    </div>
                    <div class="flex justify-between mb-4">
                        <span class="text-muted uppercase tracking-wide text-sm">Shipping</span>
                        <span x-text="shippingFee > 0 ? formatMoney(shippingFee) : 'Select Zone'"></span>
                    </div>
                    <div class="flex justify-between items-end border-t border-border pt-4">
                        <span class="font-display text-xl uppercase tracking-tighter">Total</span>
                        <span class="font-display text-2xl" x-text="formatMoney(subtotal + shippingFee)"></span>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('checkout', () => ({
        cartItems: [],
        subtotal: 0,
        shippingFee: 0,
        isSubmitting: false,
        errorMessage: '',
        form: {
            customer_name: '',
            email: '',
            phone: '',
            address_line1: '',
            city: '',
            zone_id: ''
        },

        init() {
            this.loadCart();
        },

        loadCart() {
            const savedCart = localStorage.getItem('metrodrip_cart');
            if (savedCart) {
                try {
                    this.cartItems = JSON.parse(savedCart);
                    this.calculateSubtotal();
                } catch (e) {
                    console.error('Failed to parse cart JSON');
                }
            }
            if (this.cartItems.length === 0) {
                window.location.href = "{% url 'storefront:cart' %}";
            }
        },

        calculateSubtotal() {
            this.subtotal = this.cartItems.reduce((sum, item) => sum + (item.price * item.qty), 0);
        },

        updateShipping(e) {
            const selectedOption = e.target.options[e.target.selectedIndex];
            if (selectedOption && selectedOption.value) {
                this.shippingFee = parseInt(selectedOption.dataset.fee, 10);
            } else {
                this.shippingFee = 0;
            }
        },

        formatMoney(centavos) {
            return '₱' + (centavos / 100).toLocaleString('en-PH', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        },

        async submitOrder() {
            this.isSubmitting = true;
            this.errorMessage = '';
            
            const payload = {
                ...this.form,
                items: this.cartItems
            };
            
            try {
                const response = await fetch("{% url 'storefront:checkout' %}", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken")
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Clear cart
                    localStorage.removeItem('metrodrip_cart');
                    // Dispatch event to update navbar badge
                    window.dispatchEvent(new Event('cart-updated'));
                    // Redirect to payment
                    window.location.href = data.checkout_url;
                } else {
                    this.errorMessage = data.error || 'Checkout failed. Please try again.';
                    this.isSubmitting = false;
                }
            } catch (err) {
                this.errorMessage = 'Network error. Please try again.';
                this.isSubmitting = false;
            }
        }
    }));
});

// Helper for CSRF token
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>

{% if GOOGLE_MAPS_API_KEY %}
<script async defer src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&libraries=places&callback=initAutocomplete"></script>
<script>
let autocomplete;
function initAutocomplete() {
    const addressInput = document.querySelector('input[x-model="form.address_line1"]');
    if (addressInput) {
        autocomplete = new google.maps.places.Autocomplete(addressInput, {
            componentRestrictions: { country: "ph" },
            fields: ["address_components", "formatted_address"],
            types: ["address"]
        });
        
        autocomplete.addListener("place_changed", () => {
            const place = autocomplete.getPlace();
            if (!place.address_components) return;
            
            // Integrate with Alpine
            addressInput.dispatchEvent(new Event('input'));
            
            let city = "";
            for (const component of place.address_components) {
                const type = component.types[0];
                if (type === "locality" || type === "administrative_area_level_2") {
                    city = component.long_name;
                }
            }
            
            if (city) {
                const cityInput = document.querySelector('input[x-model="form.city"]');
                if (cityInput) {
                    cityInput.value = city;
                    cityInput.dispatchEvent(new Event('input'));
                }
            }
        });
    }
}
</script>
{% endif %}

{% endblock %}
