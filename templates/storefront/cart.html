{% extends "base.html" %}
{% load static %}

{% block title %}Cart{% endblock %}
{% block meta_description %}Your MetroDrip shopping cart.{% endblock %}

{% block extra_js %}
<script src="{% static 'js/cart.js' %}"></script>
{% endblock %}

{% block content %}
<div class="container" x-data="cartPage()" x-init="init()">
  <section class="section">
    <h1>Your Cart</h1>

    {# --- Empty State --- #}
    <template x-if="items.length === 0 && !loading">
      <div class="empty-state">
        <div class="empty-state__icon">🛒</div>
        <h3>Your cart is empty</h3>
        <p class="empty-state__text">Looks like you haven't added anything yet.</p>
        <a href="{% url 'storefront:shop' %}" class="btn btn--primary">
          Start Shopping
        </a>
      </div>
    </template>

    {# --- Cart with Items --- #}
    <template x-if="items.length > 0">
      <div class="cart-layout">
        {# Cart Table #}
        <div>
          <table class="cart-table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th style="text-align: right;">Total</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="item in items" :key="item.variantId">
                <tr>
                  <td>
                    <div class="cart-item__product">
                      <div class="cart-item__thumb">
                        {# Placeholder thumb — product images come from CDN later #}
                      </div>
                      <div>
                        <div class="cart-item__name" x-text="item.productName"></div>
                        <div class="cart-item__variant">
                          <span x-text="item.size"></span> /
                          <span x-text="item.color"></span> /
                          <span x-text="item.fit"></span>
                        </div>
                        <span class="sku-tag" x-text="item.sku"></span>
                        <br>
                        <button class="cart-item__remove" @click="removeItem(item.variantId)">
                          Remove
                        </button>
                      </div>
                    </div>
                  </td>
                  <td>
                    <span class="text-mono" x-text="item.priceDisplay"></span>
                  </td>
                  <td>
                    <div class="qty-adjuster">
                      <button class="qty-adjuster__btn" @click="updateQty(item.variantId, -1)">−</button>
                      <input class="qty-adjuster__value" type="text" :value="item.qty" readonly>
                      <button class="qty-adjuster__btn" @click="updateQty(item.variantId, 1)">+</button>
                    </div>
                  </td>
                  <td style="text-align: right;">
                    <span class="text-price" x-text="formatPeso(lineTotal(item))"></span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>

          {# Clear cart #}
          <div style="margin-top: var(--space-md); text-align: right;">
            <button class="btn btn--secondary btn--sm" @click="clearCart()">
              Clear Cart
            </button>
          </div>
        </div>

        {# --- Waybill-style Summary Card (§14 motif) --- #}
        <div class="waybill-card">
          <div class="waybill-card__header">Order Summary</div>

          <div class="waybill-card__row">
            <span class="waybill-card__label">
              Items (<span x-text="itemCount"></span>)
            </span>
            <span class="waybill-card__value" x-text="subtotalDisplay"></span>
          </div>

          <div class="waybill-card__row">
            <span class="waybill-card__label">Shipping</span>
            <span class="waybill-card__value text-muted" style="font-size: 0.75rem;">
              Calculated at checkout
            </span>
          </div>

          <div class="waybill-card__row">
            <span class="waybill-card__label" style="font-weight: 700;">Estimated Total</span>
            <span class="waybill-card__value waybill-card__value--total" x-text="subtotalDisplay"></span>
          </div>

          <div style="margin-top: var(--space-lg);">
            <a href="#" class="btn btn--primary btn--block btn--lg">
              Proceed to Checkout
            </a>
            <a href="{% url 'storefront:shop' %}" class="btn btn--secondary btn--block mt-sm" style="font-size: 0.75rem;">
              Continue Shopping
            </a>
          </div>
        </div>
      </div>
    </template>

  </section>
</div>
{% endblock %}
