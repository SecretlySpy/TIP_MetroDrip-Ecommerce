{% extends "base.html" %}

{% block title %}Register{% endblock %}
{% block meta_description %}Create a MetroDrip account.{% endblock %}

{% block content %}
<div class="container" style="max-width: 400px; margin: 4rem auto;">
  <h1 style="text-align: center; font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 2rem;">REGISTER</h1>
  
  {% if error %}
  <div style="background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 4px; margin-bottom: 1.5rem; text-align: center;">
    {{ error }}
  </div>
  {% endif %}
  
  <form method="POST" action="{% url 'accounts:register' %}" style="display: flex; flex-direction: column; gap: 1rem;">
    {% csrf_token %}
    
    <div>
      <label for="name" style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Full Name</label>
      <input type="text" id="name" name="name" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); border-radius: 4px;">
    </div>

    <div>
      <label for="email" style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Email Address</label>
      <input type="email" id="email" name="email" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); border-radius: 4px;">
    </div>
    
    <div>
      <label for="phone" style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Phone Number (Optional)</label>
      <input type="tel" id="phone" name="phone" style="width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); border-radius: 4px;">
    </div>
    
    <div>
      <label for="password" style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Password</label>
      <input type="password" id="password" name="password" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); border-radius: 4px;">
    </div>
    
    <button type="submit" class="btn btn--primary" style="margin-top: 1rem; width: 100%;">Create Account</button>
  </form>
  
  <p style="text-align: center; margin-top: 2rem; color: var(--color-muted);">
    Already have an account? <a href="{% url 'accounts:login' %}" style="color: var(--color-ink); text-decoration: underline;">Log in here</a>.
  </p>
</div>
{% endblock %}
