[tool.ruff]
line-length = 100
target-version = "py314"
extend-exclude = ["**/migrations/**"]

[tool.ruff.lint]
# E/W pycodestyle, F pyflakes, I import order, B bugbear, UP pyupgrade, DJ flake8-django
select = ["E", "F", "W", "I", "B", "UP", "DJ"]

[tool.ruff.lint.per-file-ignores]
# One-off root-level seed scripts call django.setup() before their imports and
# hold long content strings; they are dev utilities, not shipped code.
"seed_*.py" = ["E402", "E501"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["test_*.py"]
testpaths = ["tests", "apps"]
addopts = "-ra"
